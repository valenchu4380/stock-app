<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costos por Línea</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <style>
        body { background: var(--color-fondo); }
        .hero { background: linear-gradient(135deg, var(--color-rosa), var(--color-rosa-hover)); color: white; text-align: center; padding: 40px 20px; }
        .hero h1 { font-size: 2rem; }
        .hero p { margin-top: 6px; font-size: 1rem; opacity: .85; }
        .container { width: 92%; max-width: 1000px; margin: 30px auto; }
        .volver { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: var(--color-crema); border: 1.5px solid var(--color-rosa-borde); border-radius: var(--radius); text-decoration: none; color: var(--color-texto); font-weight: 600; }
        .volver:hover { background: var(--color-melocoton); border-color: var(--color-rosa); color: var(--color-rosa); }
        .mensaje { padding: 14px 20px; border-radius: var(--radius); margin-bottom: 20px; font-size: 0.95rem; }
        .mensaje.ok  { background: #d1fae5; color: #065f46; }
        .mensaje.err { background: #fee2e2; color: #991b1b; }
        .tabla-container { background: var(--color-crema); border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,.1); overflow: hidden; }
        .tabla-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        thead { background: var(--color-melocoton); }
        th { padding: 14px 16px; text-align: left; font-size: 0.82rem; color: var(--color-rosa); text-transform: uppercase; letter-spacing: .05em; }
        td { padding: 12px 16px; border-top: 1px solid var(--color-rosa-borde); font-size: 1rem; color: var(--color-texto); }
        tr:hover td { background: var(--color-melocoton); }
        .costo-input { width: 120px; padding: 12px 10px; border: 1.5px solid var(--color-rosa-borde); border-radius: 8px; font-size: 1rem; min-height: 44px; }
        .costo-input:focus { border-color: var(--color-rosa); outline: none; }
        .btn-actualizar { background: var(--color-rosa); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; min-height: 44px; }
        .btn-actualizar:hover { background: var(--color-rosa-hover); }
        .badge-count { display: inline-block; background: var(--color-melocoton); color: var(--color-rosa); padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .empty { padding: 40px; text-align: center; color: var(--color-texto); }
        .empty a { display: inline-block; margin-top: 18px; padding: 12px 28px; background: var(--color-rosa); color: white; border-radius: var(--radius); text-decoration: none; font-weight: 600; }
        .empty a:hover { background: var(--color-rosa-hover); }
        .breadcrumbs { padding: 10px 4%; background: var(--color-crema); border-bottom: 1px solid var(--color-rosa-borde); font-size: 0.9rem; }
        .breadcrumbs a { color: var(--color-rosa); text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }
        .breadcrumbs span { color: var(--color-texto); }
        @media (max-width: 1024px) {
            .hero h1 { font-size: 1.3rem; }
            .hero { padding: 25px 16px; }
            .container { width: 95%; }
            td, th { padding: 10px 12px; }
        }
    </style>
</head>
<body>
<nav class="breadcrumbs" aria-label="Breadcrumb">
    <a th:href="@{/productos/dashboard}">Dashboard</a>
    <span> › </span>
    <span aria-current="page">Costos por Línea</span>
</nav>
<div class="hero">
    <h1>Costos por Línea</h1>
    <p>Asigná un precio de costo único a todos los productos de una misma línea</p>
</div>
<div class="container">
    <a class="volver" th:href="@{/productos}">← Volver a Productos</a>
    <div class="mensaje ok"  th:if="${mensaje}" th:text="${mensaje}"></div>
    <div class="mensaje err" th:if="${error}" th:text="${error}"></div>
    <div class="tabla-container">
        <div class="tabla-wrapper">
            <table th:if="${lineas != null and !#lists.isEmpty(lineas)}">
                <thead><tr><th>Línea</th><th>Productos</th><th>Costo de compra ($)</th><th></th></tr></thead>
                <tbody>
                    <tr th:each="l : ${lineas}">
                        <td style="font-weight:600;color:var(--color-texto-oscuro);" th:text="${l.linea.displayName}">Línea</td>
                        <td><span class="badge-count" th:text="${l.productCount}">0</span></td>
                        <td>
                            <form th:action="@{/productos/lineas/actualizar-costo}" method="post" style="display:flex;gap:8px;">
                                <input type="hidden" name="linea" th:value="${l.linea.name()}"/>
                                <input class="costo-input touch-target" type="number" name="costPrice" step="0.01" min="0" th:value="${l.costPrice}" required/>
                                <button class="btn-actualizar touch-target" type="submit">Actualizar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${lineas == null or #lists.isEmpty(lineas)}">
                <div style="font-size:3.5rem;margin-bottom:14px;">🏷️</div>
                <p style="font-size:1.1rem;font-weight:700;color:var(--color-texto-oscuro);">No hay líneas registradas</p>
                <p style="font-size:0.9rem;color:var(--color-texto);margin-top:6px;">Agregá un producto y la línea se detectará automáticamente</p>
                <a th:href="@{/productos/nuevo}">+ Agregar producto</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
