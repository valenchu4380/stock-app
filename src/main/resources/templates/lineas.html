<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costos por Línea</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; }
        .hero { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; text-align: center; padding: 40px 20px; }
        .hero h1 { font-size: 2rem; }
        .hero p { margin-top: 6px; font-size: 1rem; opacity: .85; }
        .container { width: 92%; max-width: 1000px; margin: 30px auto; }
        .volver { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: white; border: 1.5px solid #dce1ec; border-radius: 10px; text-decoration: none; color: #374151; font-weight: 600; }
        .volver:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
        .mensaje { padding: 14px 20px; border-radius: 10px; margin-bottom: 20px; font-size: 0.95rem; }
        .mensaje.ok  { background: #d1fae5; color: #065f46; }
        .mensaje.err { background: #fee2e2; color: #991b1b; }
        .tabla-container { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,.1); overflow: hidden; }
        .tabla-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        thead { background: #eff6ff; }
        th { padding: 14px 16px; text-align: left; font-size: 0.82rem; color: #2563eb; text-transform: uppercase; letter-spacing: .05em; }
        td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover td { background: #f8faff; }
        .costo-input { width: 120px; padding: 8px 10px; border: 1.5px solid #dce1ec; border-radius: 8px; font-size: 0.9rem; }
        .costo-input:focus { border-color: #2563eb; outline: none; }
        .btn-actualizar { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-actualizar:hover { background: #1d4ed8; }
        .badge-count { display: inline-block; background: #eff6ff; color: #2563eb; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .empty { padding: 40px; text-align: center; color: #9ca3af; }
        @media (max-width: 768px) { .hero h1 { font-size: 1.3rem; } .hero { padding: 25px 16px; } .container { width: 95%; } td, th { padding: 10px 12px; } }
    </style>
</head>
<body>
<div class="hero">
    <h1>Costos por Línea</h1>
    <p>Asigná un precio de costo único a todos los productos de una misma línea</p>
</div>
<div class="container">
    <a class="volver" th:href="@{/productos}">← Volver a Productos</a>
    <div class="mensaje ok"  th:if="${mensaje}" th:text="${mensaje}"></div>
    <div class="mensaje err" th:if="${error}" th:text="${error}"></div>
    <div class="tabla-container">
        <div class="tabla-wrapper">
            <table th:if="${lineas != null and !#lists.isEmpty(lineas)}">
                <thead><tr><th>Línea</th><th>Productos</th><th>Costo de compra ($)</th><th></th></tr></thead>
                <tbody>
                    <tr th:each="l : ${lineas}">
                        <td style="font-weight:600;color:#1e3a8a;" th:text="${l.linea.displayName}">Línea</td>
                        <td><span class="badge-count" th:text="${l.productCount}">0</span></td>
                        <td>
                            <form th:action="@{/productos/lineas/actualizar-costo}" method="post" style="display:flex;gap:8px;">
                                <input type="hidden" name="linea" th:value="${l.linea.name()}"/>
                                <input class="costo-input" type="number" name="costPrice" step="0.01" min="0" th:value="${l.costPrice}" required/>
                                <button class="btn-actualizar" type="submit">Actualizar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${lineas == null or #lists.isEmpty(lineas)}">
                No hay líneas registradas. Agregá un producto y la línea se detectará automáticamente.
            </div>
        </div>
    </div>
</div>
</body>
</html>
