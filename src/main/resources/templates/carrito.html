<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobreVivi | Carrito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --color-fondo: #F9F3EC;
            --color-crema: #F5EFE6;
            --color-melocoton: #EDD5CB;
            --color-rosa-claro: #E8C4C4;
            --color-rosa-borde: #D4B8AE;
            --color-rosa: #C97B7B;
            --color-verde-claro: #A8C4A2;
            --color-verde: #7D9E78;
            --color-texto: #5C4A3A;
            --color-texto-oscuro: #3B2E24;
        }

        body { background: var(--color-fondo); min-height: 100vh; }

        .hero {
            background: linear-gradient(135deg, var(--color-rosa), #B06060);
            color: white;
            text-align: center;
            padding: 28px 20px 30px;
            position: relative;
        }
        .hero-brand {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -.02em;
        }
        .hero-brand-sub {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .65;
            margin-top: 2px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .btn-volver {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: var(--color-crema);
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            text-decoration: none;
            color: var(--color-texto);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .btn-volver:hover { background: var(--color-melocoton); border-color: var(--color-rosa-borde); color: var(--color-rosa); }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--color-crema);
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
        }
        .cart-empty .icon { font-size: 4rem; margin-bottom: 16px; }
        .cart-empty p { color: var(--color-texto); font-size: 1.1rem; margin-bottom: 20px; }
        .cart-empty a {
            display: inline-block;
            padding: 12px 28px;
            background: var(--color-rosa);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }
        .cart-empty a:hover { background: #B06060; }

        .cart-items { display: flex; flex-direction: column; gap: 12px; }
        .cart-item {
            background: var(--color-crema);
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .cart-item-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--color-crema);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
        .cart-item-img .placeholder { font-size: 1.5rem; color: var(--color-rosa-borde); }

        .cart-item-info {
            flex: 1;
            min-width: 0;
        }
        .cart-item-name {
            font-weight: 700;
            color: var(--color-texto-oscuro);
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        .cart-item-sub {
            font-size: 0.78rem;
            color: var(--color-texto);
        }
        .cart-item-price {
            font-weight: 800;
            color: var(--color-texto-oscuro);
            font-size: 1rem;
            white-space: nowrap;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qty-btn {
            width: 30px; height: 30px;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-texto);
        }
        .qty-btn:hover { border-color: var(--color-rosa); background: var(--color-melocoton); }
        .qty-btn-minus { color: #dc2626; }
        .qty-btn-minus:hover { border-color: #dc2626; background: var(--color-melocoton); }
        .qty-btn-plus { color: var(--color-verde); }
        .qty-btn-plus:hover { border-color: var(--color-verde); background: var(--color-verde-claro); }
        .qty-num {
            min-width: 28px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .qty-remove {
            background: none;
            border: none;
            color: var(--color-texto);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
        }
        .qty-remove:hover { color: #dc2626; }

        .cart-resumen {
            background: var(--color-crema);
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            padding: 22px 24px;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .cart-total-label { font-size: 0.9rem; color: var(--color-texto); }
        .cart-total-number { font-size: 1.6rem; font-weight: 800; color: var(--color-texto-oscuro); }
        .btn-whatsapp-enviar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: .15s;
        }
        .btn-whatsapp-enviar:hover { background: #1da851; }
        .btn-whatsapp-enviar:disabled {
            opacity: .5;
            cursor: not-allowed;
        }
        .btn-limpiar {
            padding: 10px 20px;
            background: var(--color-crema);
            color: #dc2626;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-limpiar:hover { border-color: #dc2626; background: var(--color-melocoton); }

        .gift-banner {
            background: linear-gradient(135deg, #FFF5E6, #FFE0B2);
            border: 2px dashed var(--color-rosa);
            border-radius: 14px;
            padding: 16px 20px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: giftPulse 2s ease-in-out infinite;
        }
        @keyframes giftPulse {
            0%, 100% { border-color: var(--color-rosa); }
            50% { border-color: #FFD700; }
        }
        .gift-banner-img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }
        .gift-banner-img img { width: 100%; height: 100%; object-fit: contain; }
        .gift-banner-info { flex: 1; }
        .gift-banner-title {
            font-weight: 800;
            color: var(--color-rosa);
            font-size: 1rem;
        }
        .gift-banner-sub {
            font-size: 0.82rem;
            color: var(--color-texto);
            margin-top: 2px;
        }
        .gift-banner-amount {
            font-weight: 700;
            color: var(--color-verde);
            font-size: 0.85rem;
            background: #E8F5E9;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .hero { padding: 28px 16px 24px; }
            .hero-brand { font-size: 1.6rem; }
            .hero-brand-sub { font-size: 0.65rem; }
            .container { width: 92%; }
            .container { width: 92%; }
            .cart-item { flex-wrap: wrap; }
            .cart-item-info { min-width: 100%; order: -1; }
            .cart-resumen { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-brand">SobreVivi</div>
    <div class="hero-brand-sub">🛒 Tu carrito</div>
</div>

<div class="container">
    <a class="btn-volver" th:href="@{/productos}">← Seguir comprando</a>

    <div class="cart-empty" id="cartEmpty">
        <div class="icon">🛒</div>
        <p>Tu carrito está vacío</p>
        <a th:href="@{/productos}">Ver productos</a>
    </div>

    <div id="cartContent" style="display:none;">
        <div class="cart-items" id="cartItems"></div>

        <div id="giftBanner" class="gift-banner" style="display:none;">
            <div class="gift-banner-img" id="giftImg">
                <span>🧶</span>
            </div>
            <div class="gift-banner-info">
                <div class="gift-banner-title" id="giftName">🎁 Tejido de regalo</div>
                <div class="gift-banner-sub">Por compras mayores a $50.000 — ¡te lo regalamos!</div>
            </div>
            <div class="gift-banner-amount">GRATIS</div>
        </div>

        <div class="cart-resumen">
            <div>
                <div class="cart-total-label">Total</div>
                <div class="cart-total-number" id="cartTotal">$0.00</div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn-limpiar" onclick="limpiarCarrito()">Vaciar carrito</button>
                <button class="btn-whatsapp-enviar" id="btnWhatsApp" onclick="enviarPedido()">
                    💬 Enviar pedido por WhatsApp
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const WHATSAPP_NUM = [[${whatsappNum}]];

    // ── Promo apertura: tejido gratis ──
    const PROMO = {
        active: true,
        minTotal: 50000,
        name: '🎁 Tejido de regalo',
        image: 'https://i.imgur.com/sBLmBfyh.jpg',
        emoji: '🧶',
        // Fin de la promo: domingo 5 jul a las 23:59
        endDate: new Date(2026, 6, 5, 23, 59, 0) // mes 6 = julio
    };
    function promoActiva() {
        if (!PROMO.active) return false;
        const ahora = new Date();
        // Arrancó el viernes 3 de julio
        const start = new Date(2026, 6, 3, 0, 0, 0);
        return ahora >= start && ahora <= PROMO.endDate;
    }

    function getCarrito() {
        try { return JSON.parse(localStorage.getItem('carrito')) || []; } catch { return []; }
    }

    function guardarCarrito(items) {
        localStorage.setItem('carrito', JSON.stringify(items));
    }

    function enviarPedido() {
        const items = getCarrito();
        if (items.length === 0) return;
        const itemsJson = JSON.stringify(items.map(i => ({
            name: i.name,
            subCategory: i.subCategory,
            cantidad: i.cantidad,
            price: i.price
        })));
        const total = items.reduce((s, i) => s + i.price * i.cantidad, 0);
        const btn = document.getElementById('btnWhatsApp');
        btn.disabled = true;
        btn.textContent = '⌛ Guardando...';
        fetch('[[@{/productos/compras/crear}]]', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'itemsJson=' + encodeURIComponent(itemsJson) + '&total=' + total
        }).then(r => r.json()).then(data => {
            if (data.success) {
                const msg = items.map(i =>
                    '• ' + i.name + ' x' + i.cantidad + ' = $' + (i.price * i.cantidad).toFixed(2)
                ).join('\n');
                let giftMsg = '';
                if (promoActiva() && total >= PROMO.minTotal) {
                    giftMsg = '\n🎁 + ' + PROMO.name + ' (GRATIS)';
                }
                const totalMsg = '\n\nTotal: $' + total.toFixed(2) + giftMsg;
                guardarCarrito([]);
                renderizarCarrito();
                actualizarContadorGlobal();
                window.location.href = 'https://wa.me/' + WHATSAPP_NUM + '?text=Hola! Quiero comprar:\n' + encodeURIComponent(msg + totalMsg);
            } else {
                alert('Error al guardar: ' + (data.message || 'desconocido'));
            }
        }).catch(e => {
            alert('Error al conectar con el servidor: ' + e.message);
        }).finally(() => {
            btn.disabled = false;
            btn.textContent = '💬 Enviar pedido por WhatsApp';
        });
    }

    function renderizarCarrito() {
        const items = getCarrito();
        const empty = document.getElementById('cartEmpty');
        const content = document.getElementById('cartContent');
        const container = document.getElementById('cartItems');

        if (items.length === 0) {
            empty.style.display = 'block';
            content.style.display = 'none';
            return;
        }
        empty.style.display = 'none';
        content.style.display = 'block';

        container.innerHTML = items.map((item, i) => `
            <div class="cart-item" data-index="${i}">
                <div class="cart-item-img">
                    ${item.imagen
                        ? '<img src="' + item.imagen + '">'
                        : '<span class="placeholder">📦</span>'}
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-sub">${item.subCategory ? item.subCategory.replace(/_/g, ' ') : ''}</div>
                </div>
                <div class="cart-item-price">$${(item.price * item.cantidad).toFixed(2)}</div>
                <div class="cart-item-qty">
                    <button class="qty-btn qty-btn-minus" onclick="cambiarCantidad(${i}, -1)">−</button>
                    <span class="qty-num">${item.cantidad}</span>
                    <button class="qty-btn qty-btn-plus" onclick="cambiarCantidad(${i}, 1)">+</button>
                    <button class="qty-remove" onclick="eliminarDelCarrito(${i})">✕</button>
                </div>
            </div>
        `).join('');

        const total = items.reduce((s, i) => s + i.price * i.cantidad, 0);
        document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);

        // ── Gift banner ──
        const giftBanner = document.getElementById('giftBanner');
        if (promoActiva() && total >= PROMO.minTotal) {
            const imgEl = document.getElementById('giftImg');
            if (PROMO.image) {
                imgEl.innerHTML = '<img src="' + PROMO.image + '" alt="' + PROMO.name + '">';
            } else {
                imgEl.innerHTML = '<span>' + PROMO.emoji + '</span>';
            }
            document.getElementById('giftName').textContent = PROMO.name;
            giftBanner.style.display = 'flex';
        } else {
            giftBanner.style.display = 'none';
        }
    }

    function cambiarCantidad(index, delta) {
        const items = getCarrito();
        if (!items[index]) return;
        const nueva = items[index].cantidad + delta;
        const max = items[index].stock;
        if (max != null) {
            items[index].cantidad = Math.max(1, Math.min(nueva, max));
        } else {
            items[index].cantidad = Math.max(1, nueva);
        }
        guardarCarrito(items);
        renderizarCarrito();
        actualizarContadorGlobal();
    }

    function eliminarDelCarrito(index) {
        const items = getCarrito();
        items.splice(index, 1);
        guardarCarrito(items);
        renderizarCarrito();
        actualizarContadorGlobal();
    }

    function limpiarCarrito() {
        if (!confirm('¿Vaciar carrito?')) return;
        guardarCarrito([]);
        renderizarCarrito();
        actualizarContadorGlobal();
    }

    function actualizarContadorGlobal() {
        const items = getCarrito();
        const total = items.reduce((s, i) => s + i.cantidad, 0);
        const el = document.getElementById('cartCount');
        if (el) el.textContent = total;
    }

    renderizarCarrito();
</script>

</body>
</html>
