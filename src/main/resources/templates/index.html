<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobreVivi | Productos</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <style>
        body { background: var(--color-fondo); }

        .hero {
            background: linear-gradient(135deg, var(--color-rosa), var(--color-rosa-hover));
            color: white;
            text-align: center;
            padding: 28px 20px 30px;
            position: relative;
        }
        .hero-brand {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -.02em;
        }
        .hero-brand-sub {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .65;
            margin-top: 2px;
        }

        .cart-icon {
            position: absolute;
            top: 20px;
            right: 10%;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,.15);
            transition: .15s;
        }
        .cart-icon:hover { background: rgba(255,255,255,.25); }
        .cart-count {
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .search-bar {
            width: 80%;
            margin: 24px auto 0;
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--color-rosa); }

        .productos-grid {
            width: 80%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .producto-card {
            background: var(--color-crema);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            transition: transform .15s, box-shadow .15s;
            position: relative;
        }
        .producto-card.sin-stock { opacity: .55; pointer-events: none; }
        .producto-card.sin-stock:hover { transform: none; box-shadow: none; }
        .card-img {
            width: 100%;
            height: 200px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 8px;
        }
        .card-img a { display: contents; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; }
        .card-img-placeholder {
            font-size: 3rem;
            color: var(--color-rosa-borde);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
        }
        .card-body { padding: 14px 16px 20px; }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--color-texto-oscuro);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .card-title a {
            color: inherit;
            text-decoration: none;
        }
        .card-title a:hover { text-decoration: underline; }
        .card-brand {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 10px;
        }
        .card-brand.avon     { background: var(--color-rosa-claro); color: var(--color-rosa); }
        .card-brand.natura   { background: var(--color-verde-claro); color: var(--color-verde); }
        .card-brand.saphirus { background: var(--color-melocoton); color: var(--color-texto-oscuro); }

        .card-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-texto-oscuro);
            margin-bottom: 6px;
        }
        .card-stock-status {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 3px 10px;
            border-radius: 8px;
            display: inline-block;
        }
        .card-stock-status.text-green { background: #dcfce7; color: #166534; }
        .card-stock-status.text-yellow { background: #fef9c3; color: #854d0e; }
        .card-stock-status.text-red { background: #fee2e2; color: #991b1b; }
        a.producto-card { cursor: pointer; color: inherit; text-decoration: none; display: block; }

        .btn-comprar {
            display: block;
            width: 100%;
            margin-top: 6px;
            padding: 12px 14px;
            background: #25D366;
            color: white !important;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            min-height: var(--touch-min);
            transition: background .15s;
        }
        .btn-comprar:hover { background: #1da851; }
        .producto-card.sin-stock .btn-comprar { pointer-events: auto; }

        .filtros-bar {
            width: 80%;
            margin: 20px auto 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filtros-bar select {
            padding: 10px 14px;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--color-texto);
            background: var(--color-crema);
            outline: none;
            min-width: 140px;
            min-height: var(--touch-min);
        }
        .filtros-bar select:focus { border-color: var(--color-rosa); }
        fieldset.filtros-bar { border: none; }
        .filtros-toggle { display: none; }
        .filtros-extra { display: contents; }

        .paginacion {
            width: 80%;
            margin: 10px auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pag-btn {
            background: var(--color-crema);
            border: 1.5px solid var(--color-rosa-borde);
            color: var(--color-texto);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
            min-height: var(--touch-min);
            min-width: var(--touch-min);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .pag-btn:hover { background: var(--color-melocoton); border-color: var(--color-rosa-borde); color: var(--color-rosa); }
        .pag-btn.active { background: var(--color-rosa); border-color: var(--color-rosa); color: white; cursor: default; }
        .pag-btn.disabled { opacity: .4; pointer-events: none; }

        .btn-orden {
            background: var(--color-crema);
            border: 1.5px solid var(--color-rosa-borde);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-rosa);
            cursor: pointer;
            text-decoration: none;
            min-height: var(--touch-min);
            display: inline-flex;
            align-items: center;
        }
        .btn-orden:hover { background: var(--color-melocoton); }
        .btn-orden.sort-active { background: var(--color-melocoton); border-color: var(--color-rosa); }

        .empty-state {
            width: 80%;
            margin: 20px auto;
            text-align: center;
            color: var(--color-texto);
            padding: 60px 20px;
            background: var(--color-crema);
            border-radius: 15px;
        }
        .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
        .empty-state .empty-text { font-size: 1.1rem; font-weight: 700; color: var(--color-texto-oscuro); margin-bottom: 8px; }
        .empty-state .empty-sub { font-size: 0.9rem; color: var(--color-texto); margin-bottom: 22px; opacity: .8; }
        .empty-state .empty-action {
            display: inline-block;
            padding: 12px 30px;
            background: var(--color-rosa);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }
        .empty-state .empty-action:hover { background: var(--color-rosa-hover); }

        @media (max-width: 1024px) {
            .hero { padding: 28px 16px 24px; }
            .hero-brand { font-size: 1.6rem; }
            .hero-brand-sub { font-size: 0.65rem; }
            .hero-tagline { font-size: 0.8rem; }
            .hero h1 { font-size: 0.95rem; }
            .hero p { font-size: 0.78rem; }
            .cart-icon { position: static; font-size: 1rem; padding: 6px 12px; margin-top: 16px; display: inline-flex; }
            .search-bar { width: 92%; margin-top: 14px; }
            .productos-grid { width: 92%; grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .filtros-bar { width: 92%; flex-direction: column; align-items: stretch; margin-top: 14px; gap: 8px; }
            .filtros-bar select { width: 100%; min-width: unset; }
            .filtros-bar .btn-orden { text-align: center; }
            .filtros-toggle { display: flex; justify-content: center; width: 100%; }
            .filtros-extra { display: none; flex-direction: column; gap: 8px; width: 100%; }
            .filtros-extra.open { display: flex; }
            .paginacion { width: 92%; }
            .empty-state { width: 92%; }
            .cart-icon { position: static; font-size: 1rem; padding: 6px 12px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-text">
    <div class="hero-brand">SobreVivi</div>
        <p style="margin-top:8px;font-size:1rem;opacity:.75;">Encontrá todo lo que buscás en perfumería y más</p>
    </div>
    <a class="cart-icon focus-visible touch-target" th:href="@{/productos/carrito}" aria-label="Carrito de compras">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </a>
</div>

<form id="filtroForm" th:action="@{/productos}" method="get" style="width:80%; margin: 0 auto;">
    <input type="hidden" name="page" value="0"/>
    <input type="hidden" id="hiddenCategory" name="category" th:value="${filtroCategory}"/>
    <input type="hidden" id="hiddenSub" name="subCategory" th:value="${filtroSub}"/>
    <input type="hidden" name="sortBy"  th:value="${sortBy}"/>
    <input type="hidden" name="sortDir" th:value="${sortDir}"/>
    <div class="search-bar">
        <input type="text"
               id="searchInput"
               name="name"
               th:value="${filtroName}"
               placeholder="Buscá por nombre de producto..."
               autocomplete="off"
               class="focus-visible"/>
    </div>
</form>

<fieldset class="filtros-bar" role="group" aria-label="Filtros">
    <legend class="sr-only">Filtros de búsqueda</legend>
    <select id="filtro-cat" onchange="aplicarFiltros()" class="focus-visible">
        <option value="" th:selected="${filtroCategory == null or filtroCategory == ''}">Todas las categorías</option>
        <option value="AVON"     th:selected="${filtroCategory == 'AVON'}">AVON</option>
        <option value="NATURA"   th:selected="${filtroCategory == 'NATURA'}">NATURA</option>
        <option value="SAPHIRUS" th:selected="${filtroCategory == 'SAPHIRUS'}">SAPHIRUS</option>
    </select>
    <select id="filtro-sub" onchange="aplicarFiltros()" class="focus-visible">
        <option value="" th:selected="${filtroSub == null or filtroSub == ''}">Todas las subcategorías</option>
        <option value="PERFUME"        th:selected="${filtroSub == 'PERFUME'}">Perfume</option>
        <option value="MAQUILLAJE"     th:selected="${filtroSub == 'MAQUILLAJE'}">Maquillaje</option>
        <option value="CABELLO"        th:selected="${filtroSub == 'CABELLO'}">Cabello</option>
        <option value="CREMA"          th:selected="${filtroSub == 'CREMA'}">Crema</option>
        <option value="CUIDADO_DIARIO" th:selected="${filtroSub == 'CUIDADO_DIARIO'}">Cuidado diario</option>
        <option value="TEXTIL"         th:selected="${filtroSub == 'TEXTIL'}">Textil</option>
        <option value="AEROSOL"        th:selected="${filtroSub == 'AEROSOL'}">Aerosol</option>
        <option value="DIFUSOR"        th:selected="${filtroSub == 'DIFUSOR'}">Difusor</option>
        <option value="JABON"          th:selected="${filtroSub == 'JABON'}">Jabón</option>
        <option value="PERFUME_PISO"   th:selected="${filtroSub == 'PERFUME_PISO'}">Perfume para piso</option>
        <option value="SAHUMERIO"      th:selected="${filtroSub == 'SAHUMERIO'}">Sahumerio</option>
    </select>
    <button type="button" id="filtrosToggle" class="btn-orden touch-target focus-visible filtros-toggle" aria-expanded="false" aria-label="Mostrar más filtros">▼ Más filtros</button>
    <div id="filtrosExtra" class="filtros-extra">
        <a class="btn-orden touch-target focus-visible" th:classappend="(${sortBy} == 'name') ? ' sort-active' : ''"
           th:href="@{/productos(page=0, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy='name', sortDir=${sortBy == 'name' ? sortDirNext : 'asc'})}">Nombre ↑↓</a>
        <a class="btn-orden touch-target focus-visible" th:classappend="(${sortBy} == 'price') ? ' sort-active' : ''"
           th:href="@{/productos(page=0, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy='price', sortDir=${sortBy == 'price' ? sortDirNext : 'asc'})}">Precio ↑↓</a>
    </div>
</fieldset>

<div class="productos-grid" th:if="${productos != null and !#lists.isEmpty(productos)}">
    <th:block th:insert="fragments/producto-cards :: cardGrid"></th:block>
</div>

    <div class="empty-state" th:if="${productos == null or #lists.isEmpty(productos)}">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">No se encontraron productos</div>
        <div class="empty-sub" th:if="${filtroName != null and !#strings.isEmpty(filtroName)}" th:text="'No hay resultados para &quot;' + ${filtroName} + '&quot;'">No hay resultados</div>
        <div class="empty-sub" th:unless="${filtroName != null and !#strings.isEmpty(filtroName)}">Probá cambiando los filtros de búsqueda</div>
        <a class="empty-action" th:href="@{/productos}">Ver todos los productos</a>
    </div>

<div id="scroll-sentinel" th:if="${productos != null and #lists.size(productos) >= 15}" style="text-align:center;padding:16px 0 32px;color:var(--color-texto);font-size:1rem;">
    <div id="loading-spinner" style="display:none;">Cargando más productos…</div>
    <div id="end-message" style="display:none;">Ya no hay más productos</div>
</div>

<script>
    let searchTimer;

    // ── Filter toggle for mobile ──
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.getElementById('filtrosToggle');
        const extra = document.getElementById('filtrosExtra');
        if (toggle && extra) {
            toggle.addEventListener('click', function() {
                const open = extra.classList.toggle('open');
                toggle.setAttribute('aria-expanded', open);
                toggle.innerHTML = open ? '▲ Menos filtros' : '▼ Más filtros';
            });
        }
    });

    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            document.querySelector('#filtroForm input[name="page"]').value = '0';
            document.getElementById('filtroForm').submit();
        }, 1000);
    });

    const subPorCat = {
        AVON:     ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO'],
        NATURA:   ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO'],
        SAPHIRUS: ['TEXTIL','AEROSOL','DIFUSOR','JABON','PERFUME_PISO','SAHUMERIO']
    };

    function aplicarFiltros() {
        const cat = document.getElementById('filtro-cat').value;
        const sub = document.getElementById('filtro-sub').value;
        const subSel = document.getElementById('filtro-sub');
        subSel.innerHTML = '<option value="">Todas las subcategorías</option>';
        const opciones = cat && subPorCat[cat] ? subPorCat[cat] : [];
        (cat ? opciones : ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO','TEXTIL','AEROSOL','DIFUSOR','JABON','PERFUME_PISO','SAHUMERIO']).forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s.replace(/_/g, ' ');
            if (s === sub) opt.selected = true;
            subSel.appendChild(opt);
        });
        document.getElementById('hiddenCategory').value = cat;
        document.getElementById('hiddenSub').value = sub;
        document.querySelector('#filtroForm input[name="page"]').value = '0';
        document.getElementById('filtroForm').submit();
    }

    function getCarrito() {
        try { return JSON.parse(localStorage.getItem('carrito')) || []; } catch { return []; }
    }

    function actualizarContador() {
        const items = getCarrito();
        const total = items.reduce((s, i) => s + i.cantidad, 0);
        const el = document.getElementById('cartCount');
        if (el) el.textContent = total;
    }

    actualizarContador();

    const sentinel = document.getElementById('scroll-sentinel');
    if (sentinel) {
        let currentPage = 0;
        let loading = false;
        let hasMore = true;

        const observer = new IntersectionObserver(async (entries) => {
            if (!entries[0].isIntersecting || loading || !hasMore) return;
            loading = true;
            document.getElementById('loading-spinner').style.display = 'block';

            currentPage++;
            const params = new URLSearchParams(window.location.search);
            params.set('page', currentPage);

            try {
                const res = await fetch('/productos/mas?' + params.toString());
                const html = await res.text();
                if (html.trim()) {
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    document.querySelector('.productos-grid').append(...temp.children);
                } else {
                    hasMore = false;
                    observer.unobserve(sentinel);
                    document.getElementById('end-message').style.display = 'block';
                }
            } catch (e) {
                currentPage--;
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
                loading = false;
            }
        });

        observer.observe(sentinel);
    }
</script>

</body>
</html>
