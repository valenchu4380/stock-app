<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Stock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f7fb;
        }

        .btn-orden {
            background: white;
            border: 1.5px solid #dce1ec;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
        }

        .btn-orden:hover {
            background: #eff6ff;
        }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 2.5rem;
        }

        .cards {
            width: 80%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 35px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .search-bar {
            width: 80%;
            margin: 30px auto 0;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        .search-bar button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .tabla-container {
            width: 80%;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
            overflow: hidden;
        }

        .tabla-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            padding: 14px 20px;
            text-align: left;
            background: #eff6ff;
            color: #2563eb;
            text-transform: uppercase;
        }

        td {
            padding: 14px 20px;
            border-top: 1px solid #f1f5f9;
        }

        .cards-mobile {
            display: none;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        @media (max-width: 768px) {
            .tabla-container {
                display: none;
            }

            .cards-mobile {
                display: block;
                width: 92%;
                margin: 20px auto;
            }
        }
    </style>
</head>

<body>
    <div class="hero">
        <h1>Sistema de Gestión de Stock</h1>
        <p>Administra tus productos de manera rápida y eficiente</p>
    </div>

    <div class="tabla-container">
        <h2>📋 Listado de Productos</h2>
        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.name}">Nombre</td>
                        <td th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                        <td th:text="${p.stock}"></td>
                        <td th:text="${p.category}"></td>
                        <td>
                            <a th:href="@{/productos/editar/{n}(n=${p.name})}">Editar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
