<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
        }
        .hero h1 { font-size: 1.8rem; }
        .hero p { margin-top: 6px; font-size: 1rem; opacity: .85; }

        .cart-icon {
            position: absolute;
            top: 20px;
            right: 10%;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,.15);
            transition: .15s;
        }
        .cart-icon:hover { background: rgba(255,255,255,.25); }
        .cart-count {
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .search-bar {
            width: 80%;
            margin: 24px auto 0;
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus { border-color: #2563eb; }

        .productos-grid {
            width: 80%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .producto-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            transition: transform .15s, box-shadow .15s;
        }
        .producto-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
        .card-img {
            width: 100%;
            height: 200px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 8px;
        }
        .card-img a { display: contents; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; }
        .card-img-placeholder {
            font-size: 3rem;
            color: #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100%;
        }
        .card-body { padding: 14px 16px 16px; }
        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .card-title a {
            color: inherit;
            text-decoration: none;
        }
        .card-title a:hover { text-decoration: underline; }
        .card-brand {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 10px;
        }
        .card-brand.avon     { background: #fce7f3; color: #9d174d; }
        .card-brand.natura   { background: #d1fae5; color: #065f46; }
        .card-brand.saphirus { background: #ede9fe; color: #4c1d95; }
        .card-sub {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .card-linea {
            font-size: 0.72rem;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .card-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .card-stock-status {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .text-green { color: #059669; }
        .text-yellow { color: #e6b800; }
        .text-red { color: #dc2626; }
        a.producto-card { cursor: pointer; color: inherit; text-decoration: none; display: block; }

        .filtros-bar {
            width: 80%;
            margin: 20px auto 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filtros-bar select {
            padding: 10px 14px;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            font-size: 0.88rem;
            color: #374151;
            background: white;
            outline: none;
            min-width: 140px;
        }
        .filtros-bar select:focus { border-color: #2563eb; }

        .paginacion {
            width: 80%;
            margin: 10px auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pag-btn {
            background: white;
            border: 1.5px solid #dce1ec;
            color: #374151;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
        }
        .pag-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
        .pag-btn.active { background: #2563eb; border-color: #2563eb; color: white; cursor: default; }
        .pag-btn.disabled { opacity: .4; pointer-events: none; }

        .btn-orden {
            background: white;
            border: 1.5px solid #dce1ec;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-orden:hover { background: #eff6ff; }
        .btn-orden.sort-active { background: #eff6ff; border-color: #2563eb; }

        .empty-state {
            width: 80%;
            margin: 20px auto;
            text-align: center;
            color: #9ca3af;
            padding: 40px 0;
            background: white;
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .hero { padding: 25px 16px; }
            .hero h1 { font-size: 1.4rem; }
            .search-bar { width: 92%; }
            .productos-grid { width: 92%; grid-template-columns: 1fr; }
            .filtros-bar { width: 92%; }
            .paginacion { width: 92%; }
            .empty-state { width: 92%; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Nuestros Productos</h1>
    <p>Encontrá todo lo que buscás en perfumería y más</p>
    <a class="cart-icon" th:href="@{/productos/carrito}">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </a>
</div>

<form id="filtroForm" th:action="@{/productos}" method="get" style="width:80%; margin: 0 auto;">
    <input type="hidden" name="page" value="0"/>
    <input type="hidden" id="hiddenCategory" name="category" th:value="${filtroCategory}"/>
    <input type="hidden" id="hiddenSub" name="subCategory" th:value="${filtroSub}"/>
    <input type="hidden" name="sortBy"  th:value="${sortBy}"/>
    <input type="hidden" name="sortDir" th:value="${sortDir}"/>
    <div class="search-bar">
        <input type="text"
               id="searchInput"
               name="name"
               th:value="${filtroName}"
               placeholder="Buscá por nombre de producto..."
               autocomplete="off"/>
    </div>
</form>

<div class="filtros-bar">
    <select id="filtro-cat" onchange="aplicarFiltros()">
        <option value="" th:selected="${filtroCategory == null or filtroCategory == ''}">Todas las categorías</option>
        <option value="AVON"     th:selected="${filtroCategory == 'AVON'}">AVON</option>
        <option value="NATURA"   th:selected="${filtroCategory == 'NATURA'}">NATURA</option>
        <option value="SAPHIRUS" th:selected="${filtroCategory == 'SAPHIRUS'}">SAPHIRUS</option>
    </select>
    <select id="filtro-sub" onchange="aplicarFiltros()">
        <option value="" th:selected="${filtroSub == null or filtroSub == ''}">Todas las subcategorías</option>
        <option value="PERFUME"        th:selected="${filtroSub == 'PERFUME'}">Perfume</option>
        <option value="MAQUILLAJE"     th:selected="${filtroSub == 'MAQUILLAJE'}">Maquillaje</option>
        <option value="CABELLO"        th:selected="${filtroSub == 'CABELLO'}">Cabello</option>
        <option value="CREMA"          th:selected="${filtroSub == 'CREMA'}">Crema</option>
        <option value="CUIDADO_DIARIO" th:selected="${filtroSub == 'CUIDADO_DIARIO'}">Cuidado diario</option>
        <option value="TEXTIL"         th:selected="${filtroSub == 'TEXTIL'}">Textil</option>
        <option value="AEROSOL"        th:selected="${filtroSub == 'AEROSOL'}">Aerosol</option>
        <option value="DIFUSOR"        th:selected="${filtroSub == 'DIFUSOR'}">Difusor</option>
        <option value="JABON"          th:selected="${filtroSub == 'JABON'}">Jabón</option>
        <option value="PERFUME_PISO"   th:selected="${filtroSub == 'PERFUME_PISO'}">Perfume para piso</option>
        <option value="SAHUMERIO"      th:selected="${filtroSub == 'SAHUMERIO'}">Sahumerio</option>
    </select>
    <a class="btn-orden" th:classappend="(${sortBy} == 'name') ? ' sort-active' : ''"
       th:href="@{/productos(page=0, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy='name', sortDir=${sortBy == 'name' ? sortDirNext : 'asc'})}">Nombre ↑↓</a>
    <a class="btn-orden" th:classappend="(${sortBy} == 'price') ? ' sort-active' : ''"
       th:href="@{/productos(page=0, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy='price', sortDir=${sortBy == 'price' ? sortDirNext : 'asc'})}">Precio ↑↓</a>
</div>

<div class="paginacion" th:if="${totalPaginas > 1}">
    <a class="pag-btn"
       th:classappend="${paginaActual == 0 ? ' disabled' : ''}"
       th:href="@{/productos(page=${paginaActual - 1}, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy=${sortBy}, sortDir=${sortDir})}">←</a>
    <a th:each="i : ${#numbers.sequence(pageStart, pageEnd)}"
       class="pag-btn"
       th:classappend="${i == paginaActual ? ' active' : ''}"
       th:href="@{/productos(page=${i}, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy=${sortBy}, sortDir=${sortDir})}"
       th:text="${i + 1}">1</a>
    <a class="pag-btn"
       th:classappend="${paginaActual == totalPaginas - 1 ? ' disabled' : ''}"
       th:href="@{/productos(page=${paginaActual + 1}, name=${filtroName}, category=${filtroCategory}, subCategory=${filtroSub}, sortBy=${sortBy}, sortDir=${sortDir})}">→</a>
</div>

<div class="productos-grid" th:if="${productos != null and !#lists.isEmpty(productos)}">
    <a class="producto-card" th:each="p : ${productos}"
       th:href="@{/productos/detalle/{n}/{s}(n=${p.name}, s=${p.subCategory})}">
        <div class="card-img">
            <img th:if="${p.imagen != null and !#strings.isEmpty(p.imagen)}"
                 th:src="${p.imagen}">
            <div th:unless="${p.imagen != null and !#strings.isEmpty(p.imagen)}" class="card-img-placeholder">📦</div>
        </div>
        <div class="card-body">
            <div class="card-title" th:text="${p.name}">Nombre</div>
            <span class="card-brand"
                  th:classappend="${p.category.name() == 'AVON'} ? 'avon' : (${p.category.name() == 'NATURA'} ? 'natura' : 'saphirus')"
                  th:text="${p.category}">AVON</span>
            <div class="card-sub" th:text="${p.subCategory != null} ? ${p.subCategory.name().replace('_', ' ')} : '-'">Subcategoría</div>
            <div class="card-linea" th:text="${p.linea != null} ? ${p.linea.displayName} : ''">Línea</div>
            <div class="card-price" th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}">$0.00</div>
            <div class="card-stock-status"
                 th:classappend="${p.stock == 0} ? 'text-red' : (${p.stock <= 5} ? 'text-yellow' : 'text-green')">
                <span th:if="${p.stock == 0}">🔴 Sin stock</span>
                <span th:if="${p.stock == 1}">🟡 Última unidad</span>
                <span th:if="${p.stock >= 2 and p.stock <= 5}">🟡 Stock limitado</span>
                <span th:if="${p.stock > 5}">🟢 En stock</span>
            </div>
        </div>
    </a>
</div>

<div class="empty-state" th:if="${productos == null or #lists.isEmpty(productos)}">
    No se encontraron productos.
</div>

<script>
    let searchTimer;

    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            document.querySelector('#filtroForm input[name="page"]').value = '0';
            document.getElementById('filtroForm').submit();
        }, 1000);
    });

    const subPorCat = {
        AVON:     ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO'],
        NATURA:   ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO'],
        SAPHIRUS: ['TEXTIL','AEROSOL','DIFUSOR','JABON','PERFUME_PISO','SAHUMERIO']
    };

    function aplicarFiltros() {
        const cat = document.getElementById('filtro-cat').value;
        const sub = document.getElementById('filtro-sub').value;
        const subSel = document.getElementById('filtro-sub');
        subSel.innerHTML = '<option value="">Todas las subcategorías</option>';
        const opciones = cat && subPorCat[cat] ? subPorCat[cat] : [];
        (cat ? opciones : ['PERFUME','MAQUILLAJE','CABELLO','CREMA','CUIDADO_DIARIO','TEXTIL','AEROSOL','DIFUSOR','JABON','PERFUME_PISO','SAHUMERIO']).forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s.replace(/_/g, ' ');
            if (s === sub) opt.selected = true;
            subSel.appendChild(opt);
        });
        document.getElementById('hiddenCategory').value = cat;
        document.getElementById('hiddenSub').value = sub;
        document.querySelector('#filtroForm input[name="page"]').value = '0';
        document.getElementById('filtroForm').submit();
    }

    function getCarrito() {
        try { return JSON.parse(localStorage.getItem('carrito')) || []; } catch { return []; }
    }

    function actualizarContador() {
        const items = getCarrito();
        const total = items.reduce((s, i) => s + i.cantidad, 0);
        const el = document.getElementById('cartCount');
        if (el) el.textContent = total;
    }

    actualizarContador();
</script>

</body>
</html>
