<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Movimientos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .hero h1 { font-size: 2rem; }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .volver {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: white;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
        }
        .volver:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }

        .tabla-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
            overflow: hidden;
        }
        .tabla-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead { background: #eff6ff; }
        th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.82rem;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover td { background: #f8faff; }

        .badge-action {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-create { background: #d1fae5; color: #065f46; }
        .badge-update { background: #dbeafe; color: #1e40af; }
        .badge-delete { background: #fee2e2; color: #991b1b; }
        .badge-price  { background: #fef3c7; color: #92400e; }

        .paginacion {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pag-btn {
            background: white;
            border: 1.5px solid #dce1ec;
            color: #374151;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
        }
        .pag-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
        .pag-btn.active { background: #2563eb; border-color: #2563eb; color: white; cursor: default; }
        .pag-btn.disabled { opacity: .4; pointer-events: none; }

        .detalle { font-size: 0.85rem; color: #6b7280; }
        .detalle span { color: #1f2937; font-weight: 600; }

        .empty {
            padding: 40px;
            text-align: center;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .container { width: 95%; }
            .hero h1 { font-size: 1.4rem; }
            .hero { padding: 25px 16px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Historial de Movimientos</h1>
</div>

<div class="container">
    <a class="volver" th:href="@{/productos}">← Volver a Productos</a>

    <div class="tabla-container">
        <div class="tabla-wrapper">
            <table th:if="${movimientos != null and !#lists.isEmpty(movimientos)}">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Producto</th>
                        <th>Subcategoría</th>
                        <th>Acción</th>
                        <th>Detalle</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${movimientos}">
                        <td th:text="${#temporals.format(m.timestamp, 'dd/MM/yy HH:mm')}">fecha</td>
                        <td th:text="${m.productName}">producto</td>
                        <td th:text="${m.productSubCategory}">sub</td>
                        <td>
                            <span class="badge-action"
                                  th:classappend="${m.action == 'CREATE'} ? 'badge-create' : (${m.action == 'UPDATE'} ? 'badge-update' : (${m.action == 'DELETE'} ? 'badge-delete' : 'badge-price'))"
                                  th:text="${m.action == 'CREATE'} ? 'ALTA' : (${m.action == 'UPDATE'} ? 'MODIFICACIÓN' : (${m.action == 'DELETE'} ? 'BAJA' : 'PRECIO'))">acción</span>
                        </td>
                        <td>
                            <div class="detalle" th:if="${m.action == 'CREATE'}">
                                Precio: <span th:text="'$' + ${#numbers.formatDecimal(m.newPrice, 1, 2)}">$0</span>
                                | Stock: <span th:text="${m.newStock}">0</span>
                            </div>
                            <div class="detalle" th:if="${m.action == 'UPDATE'}">
                                Precio: <span th:text="'$' + ${#numbers.formatDecimal(m.oldPrice, 1, 2)}">$0</span> → <span th:text="'$' + ${#numbers.formatDecimal(m.newPrice, 1, 2)}">$0</span>
                                | Stock: <span th:text="${m.oldStock}">0</span> → <span th:text="${m.newStock}">0</span>
                            </div>
                            <div class="detalle" th:if="${m.action == 'DELETE'}">
                                Precio: <span th:text="'$' + ${#numbers.formatDecimal(m.oldPrice, 1, 2)}">$0</span>
                                | Stock: <span th:text="${m.oldStock}">0</span>
                            </div>
                            <div class="detalle" th:if="${m.action == 'PRICE_UPDATE'}">
                                <span th:text="'$' + ${#numbers.formatDecimal(m.oldPrice, 1, 2)}">$0</span> → <span th:text="'$' + ${#numbers.formatDecimal(m.newPrice, 1, 2)}">$0</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${movimientos == null or #lists.isEmpty(movimientos)}">
                No hay movimientos registrados.
            </div>
        </div>
    </div>

    <div class="paginacion" th:if="${totalPaginas > 1}">
        <a class="pag-btn"
           th:classappend="${paginaActual == 0 ? ' disabled' : ''}"
           th:href="@{/productos/movimientos(page=${paginaActual - 1})}">← Anterior</a>
        <a th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
           class="pag-btn"
           th:classappend="${i == paginaActual ? ' active' : ''}"
           th:href="@{/productos/movimientos(page=${i})}"
           th:text="${i + 1}">1</a>
        <a class="pag-btn"
           th:classappend="${paginaActual == totalPaginas - 1 ? ' disabled' : ''}"
           th:href="@{/productos/movimientos(page=${paginaActual + 1})}">Siguiente →</a>
    </div>
</div>

</body>
</html>
