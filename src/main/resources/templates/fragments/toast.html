<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="toast">
  <div id="toast-container" role="status" aria-live="polite"></div>
  <div id="dialog-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="dialog-message">
    <div id="dialog-box">
      <p id="dialog-message"></p>
      <div id="dialog-input-area" style="display:none;">
        <input type="number" id="dialog-input" min="1" class="touch-target" />
      </div>
      <div id="dialog-buttons">
        <button id="dialog-btn-cancel" class="touch-target focus-visible">No</button>
        <button id="dialog-btn-confirm" class="touch-target focus-visible">Sí</button>
      </div>
    </div>
  </div>
  <style>
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      animation: toastIn 0.35s ease, toastOut 0.35s ease 3.2s forwards;
      max-width: 420px;
    }
    .toast-success { background: #7D9E78; }
    .toast-error { background: #dc2626; }
    .toast-info { background: #C97B7B; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(120px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(120px); } }
    @media (prefers-reduced-motion: reduce) {
      .toast { animation: none; opacity: 1; transition: opacity .15s; }
      #dialog-overlay { transition: none; }
    }

    #dialog-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #dialog-box {
      background: var(--color-crema, #F5EFE6);
      padding: 30px 32px 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    #dialog-message {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-texto-oscuro, #3B2E24);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    #dialog-input-area { margin-bottom: 16px; }
    #dialog-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--color-rosa-borde, #D4B8AE);
      border-radius: 10px;
      font-size: 1.2rem;
      text-align: center;
      font-weight: 700;
      outline: none;
    }
    #dialog-input:focus { border-color: var(--color-rosa, #C97B7B); }
    #dialog-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    #dialog-buttons button {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: .15s;
      min-width: 100px;
      min-height: var(--touch-min);
    }
    #dialog-btn-confirm {
      background: var(--color-rosa, #C97B7B);
      color: white;
    }
    #dialog-btn-confirm:hover { background: #B06060; }
    #dialog-btn-cancel {
      background: var(--color-melocoton, #EDD5CB);
      color: var(--color-texto, #5C4A3A);
    }
    #dialog-btn-cancel:hover { background: #D4B8AE; }
  </style>
  <script>
    function showToast(message, type) {
      if (!type) type = 'success';
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3600);
    }

    function trapFocus(container) {
      var focusable = container.querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])');
      if (focusable.length === 0) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      first.focus();
      container.addEventListener('keydown', function handler(e) {
        if (e.key !== 'Tab') return;
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      });
    }

    function showConfirm(message, onConfirm) {
      var overlay = document.getElementById('dialog-overlay');
      var msgEl = document.getElementById('dialog-message');
      var inputArea = document.getElementById('dialog-input-area');
      var input = document.getElementById('dialog-input');
      var btnConfirm = document.getElementById('dialog-btn-confirm');
      var btnCancel = document.getElementById('dialog-btn-cancel');

      inputArea.style.display = 'none';
      msgEl.textContent = message;
      btnConfirm.textContent = 'Sí';
      btnCancel.textContent = 'No';
      overlay.style.display = 'flex';

      trapFocus(overlay);

      function cleanup() {
        overlay.style.display = 'none';
        btnConfirm.onclick = null;
        btnCancel.onclick = null;
      }

      btnConfirm.onclick = function() { cleanup(); if (onConfirm) onConfirm(true); };
      btnCancel.onclick = function() { cleanup(); if (onConfirm) onConfirm(false); };
    }

    function showPrompt(message, defaultValue, onConfirm) {
      var overlay = document.getElementById('dialog-overlay');
      var msgEl = document.getElementById('dialog-message');
      var inputArea = document.getElementById('dialog-input-area');
      var input = document.getElementById('dialog-input');
      var btnConfirm = document.getElementById('dialog-btn-confirm');
      var btnCancel = document.getElementById('dialog-btn-cancel');

      inputArea.style.display = 'block';
      msgEl.textContent = message;
      input.value = defaultValue || '1';
      input.focus();
      btnConfirm.textContent = 'Aceptar';
      btnCancel.textContent = 'Cancelar';
      overlay.style.display = 'flex';
      trapFocus(overlay);

      function cleanup() {
        overlay.style.display = 'none';
        btnConfirm.onclick = null;
        btnCancel.onclick = null;
        input.onkeydown = null;
      }

      function onOk() {
        var val = parseInt(input.value);
        if (isNaN(val) || val <= 0) {
          showToast('Ingresá un número válido', 'error');
          return;
        }
        cleanup();
        if (onConfirm) onConfirm(val);
      }

      btnConfirm.onclick = onOk;
      btnCancel.onclick = function() { cleanup(); if (onConfirm) onConfirm(null); };
      input.onkeydown = function(e) { if (e.key === 'Enter') onOk(); };
    }
  </script>
</th:block>
</html>
