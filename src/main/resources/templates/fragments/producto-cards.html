<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="cardGrid">
  <div class="producto-card" th:each="p : ${productos}"
       th:classappend="${p.stock == 0} ? 'sin-stock'"
       th:data-href="@{/productos/detalle/{n}/{s}(n=${p.name}, s=${p.subCategory})}"
       onclick="if (!event.target.closest('.btn-comprar')) { var h = this.dataset.href; if (h) location.href = h; }"
       role="article"
       th:aria-label="${p.name + ' - $' + #numbers.formatDecimal(p.price, 1, 2)}">
    <div class="card-img">
      <img th:if="${p.imagen != null and !#strings.isEmpty(p.imagen)}" th:src="${p.imagen}" th:alt="${p.name}">
      <div th:unless="${p.imagen != null and !#strings.isEmpty(p.imagen)}" class="card-img-placeholder" role="img" aria-label="Producto sin imagen">📦</div>
    </div>
    <div class="card-body">
      <div class="card-title" th:text="${p.name}">Nombre</div>
      <span class="card-brand"
            th:classappend="${p.category.name() == 'AVON'} ? 'avon' : (${p.category.name() == 'NATURA'} ? 'natura' : 'saphirus')"
            th:text="${p.category}">AVON</span>

      <div class="card-price" th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}">$0.00</div>
      <div class="card-stock-status"
           th:classappend="${p.stock == 0} ? 'text-red' : (${p.stock <= 5} ? 'text-yellow' : 'text-green')">
        <span th:if="${p.stock == 0}">🔴 Sin stock</span>
        <span th:if="${p.stock == 1}">🟡 Última unidad</span>
        <span th:if="${p.stock >= 2 and p.stock <= 5}">🟡 Stock limitado</span>
        <span th:if="${p.stock > 5}">🟢 En stock</span>
      </div>
    </div>
    <button class="btn-comprar touch-target focus-visible"
            th:data-name="${p.name}"
            th:data-price="${p.price}"
            th:data-stock="${p.stock}"
            th:data-sub="${p.subCategory}"
            th:data-category="${p.category}"
            th:data-imagen="${p.imagen != null ? p.imagen : ''}"
            onclick="agregarAlCarrito(this); event.stopPropagation();"
            th:aria-label="|Agregar ${p.name} al carrito|">
      Agregar al carrito
    </button>
  </div>
</th:block>
</html>
