<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'SobreVivi | ' + (${product != null} ? ${product.name} : 'Producto')">SobreVivi | Producto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --color-fondo: #F9F3EC;
            --color-crema: #F5EFE6;
            --color-melocoton: #EDD5CB;
            --color-rosa-claro: #E8C4C4;
            --color-rosa-borde: #D4B8AE;
            --color-rosa: #C97B7B;
            --color-verde-claro: #A8C4A2;
            --color-verde: #7D9E78;
            --color-texto: #5C4A3A;
            --color-texto-oscuro: #3B2E24;
        }

        body { background: var(--color-fondo); min-height: 100vh; }

        .nav-bar {
            background: white;
            border-bottom: 1px solid var(--color-rosa-borde);
            padding: 14px 10%;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-bar .brand {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--color-rosa);
            text-decoration: none;
            letter-spacing: -.01em;
        }
        .nav-bar .sep {
            color: var(--color-rosa-borde);
            font-size: 0.85rem;
            margin: 0 4px;
        }
        .nav-bar a {
            color: var(--color-rosa);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .nav-bar a:hover { text-decoration: underline; }
        .nav-bar span { color: var(--color-texto); font-size: 0.9rem; }

        .detalle-container {
            width: 80%;
            margin: 30px auto;
        }

        .detalle-card {
            background: var(--color-crema);
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .detalle-imagen {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            min-height: 400px;
            border-right: 1px solid var(--color-crema);
        }
        .detalle-imagen img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
        }
        .detalle-imagen-placeholder {
            font-size: 5rem;
            color: var(--color-rosa-borde);
        }

        .detalle-info {
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detalle-marca {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            width: fit-content;
        }
        .detalle-marca.avon     { background: var(--color-rosa-claro); color: var(--color-rosa); }
        .detalle-marca.natura   { background: var(--color-verde-claro); color: var(--color-verde); }
        .detalle-marca.saphirus { background: var(--color-melocoton); color: var(--color-texto-oscuro); }

        .detalle-nombre {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-texto-oscuro);
            line-height: 1.3;
        }

        .detalle-precio {
            font-size: 2rem;
            font-weight: 800;
            color: var(--color-texto-oscuro);
        }

        .detalle-cuotas {
            font-size: 0.9rem;
            color: var(--color-verde);
            font-weight: 600;
        }

        .detalle-stock {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 700;
        }
        .detalle-stock .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-green { background: var(--color-verde); }
        .dot-yellow { background: #e6b800; }
        .dot-red { background: #dc2626; }
        .text-red { color: #dc2626; }
        .text-yellow { color: #e6b800; }
        .text-green { color: var(--color-verde); }

        .detalle-sub {
            font-size: 0.85rem;
            color: var(--color-texto);
        }
        .detalle-sub strong { color: var(--color-texto); }

        .detalle-linea {
            font-size: 0.85rem;
            color: var(--color-texto);
        }
        .detalle-linea strong { color: var(--color-texto); }

        .detalle-descripcion {
            font-size: 0.92rem;
            color: var(--color-texto);
            line-height: 1.6;
            background: var(--color-crema);
            padding: 16px;
            border-radius: 12px;
            margin: 4px 0;
        }

        .detalle-botones {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .qty-selector {
            display: inline-flex;
            align-items: center;
            gap: 0;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        .qty-selector button {
            width: 38px; height: 42px;
            border: none;
            background: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--color-texto);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-selector button:hover { background: var(--color-melocoton); }
        .qty-selector button.qty-minus { color: #dc2626; }
        .qty-selector button.qty-plus { color: var(--color-verde); }
        .qty-selector span {
            min-width: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--color-texto-oscuro);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: .15s;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(.97); }
        .btn-volver {
            background: var(--color-crema);
            color: var(--color-texto);
            border: 1.5px solid var(--color-rosa-borde);
        }
        .btn-volver:hover { background: var(--color-crema); }
        .btn-carrito {
            background: var(--color-rosa);
            color: white;
        }
        .btn-carrito:hover { background: #B06060; }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .btn-whatsapp:hover { background: #1da851; }

        .mensaje {
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .mensaje.err { background: #fee2e2; color: #991b1b; }

        @media (max-width: 768px) {
            .detalle-container { width: 92%; }
            .detalle-card { grid-template-columns: 1fr; }
            .detalle-imagen {
                border-right: none;
                border-bottom: 1px solid var(--color-crema);
                min-height: 250px;
                padding: 20px;
            }
            .detalle-info { padding: 24px 20px; }
            .detalle-nombre { font-size: 1.1rem; }
            .detalle-precio { font-size: 1.6rem; }
            .nav-bar { padding: 12px 4%; }
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <a class="brand" th:href="@{/productos}">SobreVivi</a>
    <span class="sep">›</span>
    <a th:href="@{/productos}">Productos</a>
    <span class="sep" th:if="${product != null}">›</span>
    <span th:if="${product != null}" style="color:var(--color-texto);font-size:0.88rem;font-weight:500;"><span th:text="${product.name}">nombre</span></span>
</div>

<div class="detalle-container">
    <div class="mensaje err" th:if="${error}" th:text="${error}"></div>

    <div class="detalle-card" th:if="${product != null}">
        <div class="detalle-imagen">
            <img th:if="${product.imagen != null and !#strings.isEmpty(product.imagen)}"
                 th:src="${product.imagen}">
            <div th:unless="${product.imagen != null and !#strings.isEmpty(product.imagen)}"
                 class="detalle-imagen-placeholder">📦</div>
        </div>
        <div class="detalle-info">
            <span class="detalle-marca"
                  th:classappend="${product.category.name() == 'AVON'} ? 'avon' : (${product.category.name() == 'NATURA'} ? 'natura' : 'saphirus')"
                  th:text="${product.category}">CATEGORIA</span>

            <div class="detalle-nombre" th:text="${product.name}">Nombre</div>

            <div class="detalle-precio" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</div>
            <div class="detalle-cuotas" th:text="'Hasta 3 cuotas de $' + ${#numbers.formatDecimal(product.price / 3, 1, 2)}">cuotas</div>

            <div class="detalle-stock"
                 th:classappend="${product.stock == 0} ? 'text-red' : (${product.stock <= 5} ? 'text-yellow' : 'text-green')">
                <span class="dot"
                      th:classappend="${product.stock == 0} ? 'dot-red' : (${product.stock <= 5} ? 'dot-yellow' : 'dot-green')"></span>
                <span th:if="${product.stock == 0}">Sin stock</span>
                <span th:if="${product.stock == 1}">1 unidad disponible</span>
                <span th:if="${product.stock > 1}" th:text="${product.stock} + ' unidades disponibles'">stock</span>
            </div>

            <div class="detalle-sub" th:if="${product.subCategory != null}">
                <strong>Categoría:</strong> <span th:text="${product.subCategory.name().replace('_', ' ')}">sub</span>
            </div>

            <div class="detalle-linea" th:if="${product.linea != null}">
                <strong>Línea:</strong> <span th:text="${product.linea.displayName}">linea</span>
            </div>

            <div class="detalle-descripcion" th:if="${descripcion != null}" th:text="${descripcion}">
                descripción
            </div>

            <div class="detalle-botones" th:if="${product.stock > 0}">
                <div class="qty-selector">
                    <button class="qty-minus" onclick="cambiarQty(-1)">−</button>
                    <span id="detalleQty">1</span>
                    <button class="qty-plus" onclick="cambiarQty(1)">+</button>
                </div>
                <button class="btn btn-carrito"
                        th:data-name="${product.name}"
                        th:data-sub="${product.subCategory}"
                        th:data-price="${product.price}"
                        th:data-imagen="${product.imagen != null ? product.imagen : ''}"
                        th:data-stock="${product.stock}"
                        onclick="agregarAlCarrito(this)">🛒 Agregar al carrito</button>
                <a class="btn btn-volver" th:href="@{/productos}">← Volver</a>
            </div>
            <div class="detalle-botones" th:if="${product.stock == 0}">
                <span style="padding:12px 0;font-weight:600;color:#dc2626;">❌ Sin stock — no disponible</span>
                <a class="btn btn-volver" th:href="@{/productos}">← Volver</a>
            </div>
        </div>
    </div>
</div>

<script>
    function getCarrito() {
        try { return JSON.parse(localStorage.getItem('carrito')) || []; } catch { return []; }
    }
    function guardarCarrito(items) {
        localStorage.setItem('carrito', JSON.stringify(items));
    }
    function cambiarQty(delta) {
        const span = document.getElementById('detalleQty');
        let qty = parseInt(span.textContent) + delta;
        if (qty < 1) qty = 1;
        const max = parseInt(document.querySelector('.btn-carrito').dataset.stock);
        if (qty > max) qty = max;
        span.textContent = qty;
    }
    function agregarAlCarrito(btn) {
        const name = btn.dataset.name;
        const sub = btn.dataset.sub;
        const price = parseFloat(btn.dataset.price);
        const imagen = btn.dataset.imagen;
        const cantidad = parseInt(document.getElementById('detalleQty').textContent);
        const items = getCarrito();
        const existente = items.find(i => i.name === name && i.subCategory === sub);
        if (existente) {
            existente.cantidad += cantidad;
        } else {
            items.push({ name, subCategory: sub, price, imagen, cantidad });
        }
        guardarCarrito(items);
        document.getElementById('detalleQty').textContent = '1';
        const old = btn.innerHTML;
        btn.innerHTML = '✓ Agregado';
        setTimeout(() => btn.innerHTML = old, 1000);
    }
</script>
</body>
</html>
