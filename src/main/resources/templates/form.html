<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Stock</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/components/hero.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/components/breadcrumbs.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/pages/form.css(v=${#dates.createNow().getTime()})}">
</head>

<body>

    <nav class="breadcrumbs" aria-label="Breadcrumb">
        <a th:href="@{/productos}">Productos</a>
        <span> › </span>
        <span aria-current="page">Formulario</span>
    </nav>

    <div class="hero">
        <h1>Sistema de Gestión de Stock</h1>
    </div>

    <div class="form-container">
        <h2
            th:text="${product.name != null and !#strings.isEmpty(product.name)} ? '✏️ Modificar Producto' : '➕ Agregar Producto'">
            Formulario</h2>

        <div class="mensaje err" th:if="${error}" th:text="${error}"></div>
        <div class="mensaje ok" th:if="${mensaje}" th:text="${mensaje}"></div>

        <form th:action="${product.name != null and !#strings.isEmpty(product.name)} 
                  ? @{/productos/editar} : @{/productos/nuevo}" method="post" th:object="${product}">

            <input type="hidden" name="oldName" th:value="${product.name}" />
            <input type="hidden" name="oldSubCategory" th:value="${product.subCategory}" />
            <input type="hidden" name="csrf_token" th:value="${session.adminToken}" />

            <div class="form-group">
                <label for="name">Nombre del producto</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ej: Perfume Musk 50ml" aria-required="true"
                    class="focus-visible" />
            </div>

            <div class="form-group">
                <label for="price">Precio de venta ($)</label>
                <input type="number" id="price" th:field="*{price}" th:value="${product.price}" step="0.01" min="0"  placeholder="Ej: 1500.00" />
            </div>

            <div class="form-group">
                <label for="costPrice">Precio de costo ($)</label>
                <input type="number" id="costPrice" th:field="*{costPrice}" th:value="${product.costPrice}" step="0.01"
                    min="0" placeholder="Ej: 800.00" />
            </div>

            <div class="form-group">
                <label for="stock">Stock (unidades)</label>
                <input type="number" id="stock" th:field="*{stock}" th:value="${product.stock}" min="0"
                    placeholder="Ej: 50" />
            </div>

            <div class="form-group">
                <label for="category">Categoría</label>
                <select id="category" th:field="*{category}">
                    <option value="">-- Seleccioná una categoría --</option>
                    <option th:each="cat : ${Categorys}" th:value="${cat}" th:text="${cat}">Categoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="subCategory">Subcategoría</label>
                <select id="subCategory" th:field="*{subCategory}">
                    <option value="">-- Seleccioná una subcategoría --</option>
                    <option th:each="sub : ${SubCategorys}" th:value="${sub}" th:text="${sub}">SubCategoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imagen">URL de la imagen</label>
                <input type="text" id="imagen" th:field="*{imagen}" placeholder="https://ejemplo.com/foto.jpg" />
                <span style="font-size:0.78rem;color:var(--color-texto);">Podés usar links de Imgur, Google Fotos,
                    etc.</span>
                <div th:if="${product.imagen != null and !#strings.isEmpty(product.imagen)}" style="margin-top:8px;">
                    <img th:src="${product.imagen}"
                        style="max-height:80px; border-radius:8px; border:1px solid var(--color-rosa-borde);" />
                </div>
            </div>


            <div class="btn-row">
                <button class="btn-guardar touch-target focus-visible" type="submit">Guardar</button>
                <a class="btn-cancelar touch-target focus-visible" th:href="@{/productos}">Cancelar</a>
            </div>
        </form>
    </div>

    <script>
        const subcategorias = {

            AVON: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            NATURA: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            SAPHIRUS: ['TEXTIL', 'AEROSOL', 'DIFUSOR', 'JABON', 'PERFUME_PISO', 'SAHUMERIO']

        };



        selectCat = document.getElementById('category');

        const selectSub = document.getElementById('subCategory');

        const subActual = selectSub.value;



        function actualizarSubs() {

            const cat = selectCat.value;

            const opciones = subcategorias[cat] || [];

            selectSub.innerHTML = '<option value="">-- Seleccioná una subcategoría --</option>';

            opciones.forEach(op => {

                const opt = document.createElement('option');

                opt.value = op;

                opt.textContent = op.replace(/_/g, ' ');

                if (op === subActual) opt.selected = true;

                selectSub.appendChild(opt);

            });

        }



        selectCat.addEventListener('change', actualizarSubs);

        actualizarSubs();

        // nada

    </script>

</body>

</html>
