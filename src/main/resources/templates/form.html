<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Stock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 60px;
        }
        .hero h1 { font-size: 3rem; }
        .hero p  { margin-top: 10px; font-size: 1.2rem; }

        .form-container {
            width: 50%;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
        .form-container h2 {
            font-size: 1.5rem;
            color: #1e3a8a;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eff6ff;
        }
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color .2s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            background: white;
        }
        .form-group input[readonly] {
            background: #f1f5f9;
            color: #6b7280;
            cursor: not-allowed;
        }
        .mensaje {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .mensaje.err { background: #fee2e2; color: #991b1b; }
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-guardar {
            flex: 1;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-guardar:hover { background: #1e40af; }
        .btn-cancelar {
            flex: 1;
            background: white;
            color: #374151;
            border: 1.5px solid #dce1ec;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .2s;
        }
        .btn-cancelar:hover { background: #f1f5f9; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Sistema de Gestión de Stock</h1>
    <p>Administra tus productos de manera rápida y eficiente</p>
</div>

<div class="form-container">

    <!-- Si product.name tiene valor → es edición, si no → es alta -->
    <h2 th:text="${product.name != null and !#strings.isEmpty(product.name)}
                  ? '✏️ Modificar Producto'
                  : '➕ Agregar Producto'">Formulario</h2>

    <div class="mensaje err" th:if="${error}" th:text="${error}"></div>

    <!-- Action dinámico según si es nuevo o edición -->
    <form th:action="${product.name != null and !#strings.isEmpty(product.name)}
                      ? @{/productos/editar}
                      : @{/productos/nuevo}"
          method="post"
          th:object="${product}">

        <!-- name → field name de Product.java -->
        <div class="form-group">
            <label for="name">Nombre del producto</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   th:readonly="${product.name != null and !#strings.isEmpty(product.name)}"
                   placeholder="Ej: Perfume Musk 50ml" />
        </div>

        <!-- price → field price de Product.java -->
<div class="form-group">
    <label for="price">Precio ($)</label>
    <input type="number"
           id="price"
           name="price"
           th:value="${product.price != 0 ? product.price : ''}"
           step="0.01"
           min="0.01"
           placeholder="Ej: 1500.00" />
</div>

        <!-- stock → field stock de Product.java -->
<div class="form-group">
    <label for="stock">Stock (unidades)</label>
    <input type="number"
           id="stock"
           name="stock"
           th:value="${product.stock != 0 ? product.stock : ''}"
           min="1"
           placeholder="Ej: 50" />
</div>

        <!-- category → field Category de Product.java (Lombok genera getCategory()) -->
        <div class="form-group">
            <label for="category">Categoría</label>
            <select id="category" th:field="*{category}">
                <option value="">-- Seleccioná una categoría --</option>
                <!-- Categorys es el nombre que manda el controller -->
                <option th:each="cat : ${Categorys}"
                        th:value="${cat}"
                        th:text="${cat}">Categoría</option>
            </select>
        </div>

        <div class="btn-row">
            <button class="btn-guardar" type="submit">Guardar</button>
            <a class="btn-cancelar" th:href="@{/productos}">Cancelar</a>
        </div>

    </form>
</div>

</body>
</html>
