<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Stock</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <style>
        body {
            background: var(--color-fondo);
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, var(--color-rosa), var(--color-rosa-hover));
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .hero h1 { font-size: 1.5rem; }

        .form-container {
            width: 50%;
            margin: 50px auto;
            background: var(--color-crema);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-texto);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--color-rosa-borde);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--color-crema);
            min-height: var(--touch-min);
        }

        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-guardar {
            flex: 1;
            background: var(--color-rosa);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            min-height: var(--touch-min);
            font-size: 1rem;
            font-weight: 600;
        }
        .btn-guardar:hover { background: var(--color-rosa-hover); }

        .btn-cancelar {
            flex: 1;
            background: var(--color-crema);
            color: var(--color-texto);
            border: 1.5px solid var(--color-rosa-borde);
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            min-height: var(--touch-min);
            font-size: 1rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cancelar:hover { background: var(--color-melocoton); }

        .breadcrumbs {
            padding: 10px 4%;
            background: var(--color-crema);
            border-bottom: 1px solid var(--color-rosa-borde);
            font-size: 0.9rem;
        }
        .breadcrumbs a { color: var(--color-rosa); text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }
        .breadcrumbs span { color: var(--color-texto); }

        @media (max-width: 1024px) {
            .hero { padding: 25px 16px; }
            .hero h1 { font-size: 1.3rem; }
            .form-container {
                width: 92%;
                margin: 20px auto 40px;
                padding: 24px 20px;
                border-radius: 12px;
            }
            .form-group input,
            .form-group select {
                font-size: 16px;
                padding: 14px;
            }
            .btn-row {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <nav class="breadcrumbs" aria-label="Breadcrumb">
        <a th:href="@{/productos}">Productos</a>
        <span> › </span>
        <span aria-current="page">Formulario</span>
    </nav>

    <div class="hero">
        <h1>Sistema de Gestión de Stock</h1>
    </div>

    <div class="form-container">
        <h2
            th:text="${product.name != null and !#strings.isEmpty(product.name)} ? '✏️ Modificar Producto' : '➕ Agregar Producto'">
            Formulario</h2>

        <div class="mensaje err" th:if="${error}" th:text="${error}"></div>

        <form th:action="${product.name != null and !#strings.isEmpty(product.name)} 
                  ? @{/productos/editar} : @{/productos/nuevo}" method="post" th:object="${product}">

            <input type="hidden" name="oldName" th:value="${product.name}" />
            <input type="hidden" name="oldSubCategory" th:value="${product.subCategory}" />

            <div class="form-group">
                <label for="name">Nombre del producto</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ej: Perfume Musk 50ml" aria-required="true" class="focus-visible"/>
            </div>

            <div class="form-group">
    <label for="price">Precio de venta ($)</label>
    <input type="number" 
           id="price" 
           th:field="*{price}" 
        th:value="${product.price}"
           step="0.01" 
           min="0" 
           placeholder="Ej: 1500.00" />
</div>

            <div class="form-group">
    <label for="costPrice">Precio de costo ($)</label>
    <input type="number" 
           id="costPrice" 
           th:field="*{costPrice}"
        th:value="${product.costPrice}"
           step="0.01" 
           min="0" 
           placeholder="Ej: 800.00" />
</div>

            <div class="form-group">
    <label for="stock">Stock (unidades)</label>
    <input type="number" 
           id="stock" 
           th:field="*{stock}" 
       th:value="${product.stock}"
           min="0" 
           placeholder="Ej: 50" />
</div>

            <div class="form-group">
                <label for="category">Categoría</label>
                <select id="category" th:field="*{category}">
                    <option value="">-- Seleccioná una categoría --</option>
                    <option th:each="cat : ${Categorys}" th:value="${cat}" th:text="${cat}">Categoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="subCategory">Subcategoría</label>
                <select id="subCategory" th:field="*{subCategory}">
                    <option value="">-- Seleccioná una subcategoría --</option>
                    <option th:each="sub : ${SubCategorys}" th:value="${sub}" th:text="${sub}">SubCategoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imagen">URL de la imagen</label>
                <input type="url" id="imagen" th:field="*{imagen}" placeholder="https://ejemplo.com/foto.jpg"/>
                <span style="font-size:0.78rem;color:var(--color-texto);">Podés usar links de Imgur, Google Fotos, etc.</span>
                <div th:if="${product.imagen != null and !#strings.isEmpty(product.imagen)}" style="margin-top:8px;">
                    <img th:src="${product.imagen}" style="max-height:80px; border-radius:8px; border:1px solid var(--color-rosa-borde);"/>
                </div>
            </div>


            <div class="btn-row">
                <button class="btn-guardar touch-target focus-visible" type="submit">Guardar</button>
                <a class="btn-cancelar touch-target focus-visible" th:href="@{/productos}">Cancelar</a>
            </div>
        </form>
    </div>

    <script>
        const subcategorias = {

            AVON: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            NATURA: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            SAPHIRUS: ['TEXTIL', 'AEROSOL', 'DIFUSOR', 'JABON', 'PERFUME_PISO', 'SAHUMERIO']

        };



          selectCat = document.getElementById('category');

        const selectSub = document.getElementById('subCategory');

        const subActual = selectSub.value;



        function actualizarSubs() {

            const cat = selectCat.value;

            const opciones = subcategorias[cat] || [];

            selectSub.innerHTML = '<option value="">-- Seleccioná una subcategoría --</option>';

            opciones.forEach(op => {

                const opt = document.createElement('option');

                opt.value = op;

                opt.textContent = op.replace(/_/g, ' ');

                if (op === subActual) opt.selected = true;

                selectSub.appendChild(opt);

            });

        }



        selectCat.addEventListener('change', actualizarSubs);

        actualizarSubs();

            // nada

    </script>

</body>

</html>
