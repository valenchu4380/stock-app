<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Stock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .form-container {
            width: 50%;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #dce1ec;
            border-radius: 10px;
            font-size: 1rem;
            background: #fafafa;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-guardar {
            flex: 1;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-cancelar {
            flex: 1;
            background: white;
            color: #374151;
            border: 1.5px solid #dce1ec;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hero {
                padding: 25px 16px;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .form-container {
                width: 92%;
                margin: 20px auto 40px;
                padding: 24px 20px;
                border-radius: 12px;
            }

            .form-group input,
            .form-group select {
                font-size: 16px;
                padding: 14px;
            }

            .btn-row {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Sistema de Gestión de Stock</h1>
    </div>

    <div class="form-container">
        <h2
            th:text="${product.name != null and !#strings.isEmpty(product.name)} ? '✏️ Modificar Producto' : '➕ Agregar Producto'">
            Formulario</h2>

        <div class="mensaje err" th:if="${error}" th:text="${error}"></div>

        <form th:action="${product.name != null and !#strings.isEmpty(product.name)} 
                  ? @{/productos/editar} : @{/productos/nuevo}" method="post" th:object="${product}">

            <input type="hidden" name="oldName" th:value="${product.name}" />
            <input type="hidden" name="oldSubCategory" th:value="${product.subCategory}" />

            <div class="form-group">
                <label for="name">Nombre del producto</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ej: Perfume Musk 50ml" />
            </div>

            <div class="form-group">
    <label for="price">Precio de venta ($)</label>
    <input type="number" 
           id="price" 
           th:field="*{price}" 
        th:value="${product.price}"
           step="0.01" 
           min="0" 
           placeholder="Ej: 1500.00" />
</div>

            <div class="form-group">
    <label for="costPrice">Precio de costo ($)</label>
    <input type="number" 
           id="costPrice" 
           th:field="*{costPrice}"
        th:value="${product.costPrice}"
           step="0.01" 
           min="0" 
           placeholder="Ej: 800.00" />
</div>

            <div class="form-group">
    <label for="stock">Stock (unidades)</label>
    <input type="number" 
           id="stock" 
           th:field="*{stock}" 
       th:value="${product.stock}"
           min="0" 
           placeholder="Ej: 50" />
</div>

            <div class="form-group">
                <label for="category">Categoría</label>
                <select id="category" th:field="*{category}">
                    <option value="">-- Seleccioná una categoría --</option>
                    <option th:each="cat : ${Categorys}" th:value="${cat}" th:text="${cat}">Categoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="subCategory">Subcategoría</label>
                <select id="subCategory" th:field="*{subCategory}">
                    <option value="">-- Seleccioná una subcategoría --</option>
                    <option th:each="sub : ${SubCategorys}" th:value="${sub}" th:text="${sub}">SubCategoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="linea">Línea</label>
                <input type="text" id="linea" th:field="*{linea}"
                       list="lineaList" placeholder="Se detecta automáticamente del nombre"/>
                <datalist id="lineaList">
                    <option th:each="l : ${lineas}" th:value="${l}"></option>
                </datalist>
                <span style="font-size:0.78rem;color:#9ca3af;">Se asigna automáticamente según el nombre del producto</span>
            </div>

            <div class="btn-row">
                <button class="btn-guardar" type="submit">Guardar</button>
                <a class="btn-cancelar" th:href="@{/productos}">Cancelar</a>
            </div>
        </form>
    </div>

    <script>
        let detectTimer;

        function detectarLinea() {
            const name = document.getElementById('name')?.value || '';
            const cat = document.getElementById('category')?.value || '';
            const sub = document.getElementById('subCategory')?.value || '';
            const lineaInput = document.getElementById('linea');
            if (!lineaInput || !name.trim()) return;
            fetch('/productos/detectar-linea?name=' + encodeURIComponent(name) + '&category=' + encodeURIComponent(cat) + '&subCategory=' + encodeURIComponent(sub))
                .then(r => r.json())
                .then(data => {
                    if (data.linea) lineaInput.value = data.linea;
                })
                .catch(() => {});
        }

        function programarDeteccion() {
            clearTimeout(detectTimer);
            detectTimer = setTimeout(detectarLinea, 600);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const nameInput = document.getElementById('name');
            const catSelect = document.getElementById('category');
            const subSelect = document.getElementById('subCategory');
            if (nameInput) nameInput.addEventListener('input', programarDeteccion);
            if (catSelect) catSelect.addEventListener('change', programarDeteccion);
            if (subSelect) subSelect.addEventListener('change', programarDeteccion);
        });

        const subcategorias = {

            AVON: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            NATURA: ['PERFUME', 'MAQUILLAJE', 'CABELLO', 'CREMA', 'CUIDADO_DIARIO'],

            SAPHIRUS: ['TEXTIL', 'AEROSOL', 'DIFUSOR', 'JABON', 'PERFUME_PISO', 'SAHUMERIO']

        };



        const selectCat = document.getElementById('category');

        const selectSub = document.getElementById('subCategory');

        const subActual = selectSub.value;



        function actualizarSubs() {

            const cat = selectCat.value;

            const opciones = subcategorias[cat] || [];

            selectSub.innerHTML = '<option value="">-- Seleccioná una subcategoría --</option>';

            opciones.forEach(op => {

                const opt = document.createElement('option');

                opt.value = op;

                opt.textContent = op.replace(/_/g, ' ');

                if (op === subActual) opt.selected = true;

                selectSub.appendChild(opt);

            });

        }



        selectCat.addEventListener('change', actualizarSubs);

        actualizarSubs();

            window.addEventListener('DOMContentLoaded', () => {
        const precio = document.getElementById('price');
        const stock  = document.getElementById('stock');

        if (precio && parseFloat(precio.value) === 0) precio.value = '';
        if (stock  && parseInt(stock.value)    === 0) stock.value  = '';
    });

    </script>

</body>

</html>
