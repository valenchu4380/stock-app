<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobreVivi | Compras</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <style>
        body { background: var(--color-fondo); min-height: 100vh; }
        .hero { background: linear-gradient(135deg,var(--color-rosa),var(--color-rosa-hover)); color: white; text-align: center; padding: 28px 20px 20px; }
        .hero-brand { font-size: 2.2rem; font-weight: 900; letter-spacing: -.02em; }
        .hero-brand-sub { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; opacity: .65; margin-top: 2px; }
        .container { width: 90%; margin: 20px auto; max-width: 1200px; }
        .breadcrumbs { padding: 10px 4%; background: var(--color-crema); border-bottom: 1px solid var(--color-rosa-borde); font-size: 0.9rem; }
        .breadcrumbs a { color: var(--color-rosa); text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }
        .breadcrumbs span { color: var(--color-texto); }
        .btn-volver { display: inline-block; margin-bottom: 16px; padding: 12px 20px; background: var(--color-crema); border: 1.5px solid var(--color-rosa-borde); border-radius: 10px; text-decoration: none; color: var(--color-texto); font-weight: 600; font-size: 1rem; min-height: var(--touch-min); }
        .btn-volver:hover { background: var(--color-melocoton); color: var(--color-rosa); }
        .msg { padding: 12px 18px; border-radius: 10px; margin-bottom: 16px; font-weight: 600; font-size: 1rem; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .tabla { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--color-crema); border-radius: 14px; overflow: hidden; box-shadow: 0 3px 12px rgba(0,0,0,.08); }
        .tabla th { background: var(--color-rosa); color: white; padding: 14px 12px; text-align: left; font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; }
        .tabla td { padding: 12px; font-size: 1rem; color: var(--color-texto); border-bottom: 1px solid var(--color-rosa-borde); vertical-align: top; }
        .tabla tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .85rem; font-weight: 700; text-transform: uppercase; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-completada { background: #d4edda; color: #155724; }
        .badge-cancelada { background: #f8d7da; color: #721c24; }
        .items-detalle { font-size: .88rem; line-height: 1.6; }
        .items-detalle .item-line { padding: 1px 0; }
        .btn-accion { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; margin: 2px; min-height: var(--touch-min); display: inline-flex; align-items: center; }
        .btn-completar { background: var(--color-verde); color: white; }
        .btn-completar:hover { background: #5f8b5a; }
        .btn-cancelar { background: #dc2626; color: white; }
        .btn-cancelar:hover { background: #b91c1c; }
        .vacio { text-align: center; padding: 40px; color: var(--color-texto); }
        @media (max-width: 1024px) {
            .container { width: 96%; }
            .tabla, .tabla thead, .tabla tbody, .tabla tr, .tabla th, .tabla td { display: block; }
            .tabla thead { display: none; }
            .tabla tr { margin-bottom: 12px; border: 1px solid var(--color-rosa-borde); border-radius: 10px; padding: 12px; background: var(--color-crema); }
            .tabla td { border: none; padding: 6px 0; font-size: 0.95rem; }
            .tabla td::before {
                content: attr(data-label);
                display: block;
                font-weight: 700;
                color: var(--color-rosa);
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: .04em;
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>

<nav class="breadcrumbs" aria-label="Breadcrumb">
    <a th:href="@{/productos/dashboard}">Dashboard</a>
    <span> › </span>
    <span aria-current="page">Compras / Pedidos</span>
</nav>

<div class="hero">
    <div class="hero-brand">SobreVivi</div>
    <div class="hero-brand-sub">📋 Compras / Pedidos</div>
</div>

<div class="container">
    <a class="btn-volver touch-target focus-visible" th:href="@{/productos/dashboard}">← Dashboard</a>

    <div th:if="${mensaje}" class="msg success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <table class="tabla" th:if="${not #lists.isEmpty(ordenes)}">
        <thead>
            <tr>
                <th>#</th>
                <th>Fecha</th>
                <th>Items</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Completado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="o : ${ordenes}">
                <td data-label="#" th:text="${o.id}">1</td>
                <td data-label="Fecha" th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}">-</td>
                <td data-label="Items" class="items-detalle" th:text="${o.itemsJson}"></td>
                <td data-label="Total" th:text="'$' + ${#numbers.formatDecimal(o.total, 1, 2)}">$0.00</td>
                <td data-label="Estado">
                    <span class="badge" th:classappend="${o.estado == 'PENDIENTE'} ? 'badge-pendiente' : (${o.estado == 'COMPLETADA'} ? 'badge-completada' : 'badge-cancelada')"
                          th:text="${o.estado}">PENDIENTE</span>
                </td>
                <td data-label="Completado" th:text="${o.completedAt != null ? #temporals.format(o.completedAt, 'dd/MM HH:mm') : '—'}">—</td>
                <td data-label="Acción">
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/completar(id=${o.id})}" method="post" style="display:inline">
                        <button class="btn-accion btn-completar touch-target focus-visible">Completar</button>
                    </form>
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/cancelar(id=${o.id})}" method="post" style="display:inline">
                        <button class="btn-accion btn-cancelar touch-target focus-visible">Cancelar</button>
                    </form>
                    <span th:if="${o.estado != 'PENDIENTE'}" style="color:var(--color-rosa-borde);font-size:0.85rem;">—</span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="vacio" th:if="${#lists.isEmpty(ordenes)}">
        <div style="font-size:3.5rem;margin-bottom:14px;">🛍️</div>
        <p style="font-size:1.1rem;font-weight:700;color:var(--color-texto-oscuro);">No hay pedidos registrados aún</p>
        <p style="font-size:0.9rem;color:var(--color-texto);margin-top:6px;opacity:.8;">Cuando alguien haga un pedido desde la tienda, aparecerá acá</p>
        <a class="empty-action" th:href="@{/productos}" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--color-rosa);color:white;border-radius:10px;text-decoration:none;font-weight:600;">Ver tienda</a>
    </div>
</div>

</body>
</html>
