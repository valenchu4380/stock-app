<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobreVivi | Compras</title>
    <link rel="stylesheet" th:href="@{/css/main.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/components/hero.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/components/breadcrumbs.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/components/toast.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" th:href="@{/css/pages/compras.css(v=${#dates.createNow().getTime()})}">
</head>
<body>

<nav class="breadcrumbs" aria-label="Breadcrumb">
    <a th:href="@{/productos/dashboard}">Dashboard</a>
    <span> › </span>
    <span aria-current="page">Compras / Pedidos</span>
</nav>

<div class="hero">
    <div class="hero-brand">SobreVivi</div>
    <div class="hero-brand-sub">📋 Compras / Pedidos</div>
</div>

<div class="container">
    <a class="btn-volver touch-target focus-visible" th:href="@{/productos/dashboard}">← Dashboard</a>

    <div th:if="${mensaje}" class="msg success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <table class="tabla" th:if="${not #lists.isEmpty(ordenes)}">
        <thead>
            <tr>
                <th>#</th>
                <th>Fecha</th>
                <th>Items</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Completado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="o : ${ordenes}">
                <td data-label="#" th:text="${o.id}">1</td>
                <td data-label="Fecha" th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}">-</td>
                <td data-label="Items" class="items-detalle" th:text="${o.itemsJson}"></td>
                <td data-label="Total" th:text="'$' + ${#numbers.formatDecimal(o.total, 1, 2)}">$0.00</td>
                <td data-label="Estado">
                    <span class="badge" th:classappend="${o.estado == 'PENDIENTE'} ? 'badge-pendiente' : (${o.estado == 'COMPLETADA'} ? 'badge-completada' : 'badge-cancelada')"
                          th:text="${o.estado}">PENDIENTE</span>
                </td>
                <td data-label="Completado" th:text="${o.completedAt != null ? #temporals.format(o.completedAt, 'dd/MM HH:mm') : '—'}">—</td>
                <td data-label="Acción">
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/completar(id=${o.id})}" method="post" style="display:inline">
                        <input type="hidden" name="csrf_token" th:value="${csrf_token}" />
                        <button class="btn-accion btn-completar touch-target focus-visible">Completar</button>
                    </form>
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/cancelar(id=${o.id})}" method="post" style="display:inline">
                        <input type="hidden" name="csrf_token" th:value="${csrf_token}" />
                        <button class="btn-accion btn-cancelar touch-target focus-visible">Cancelar</button>
                    </form>
                    <span th:if="${o.estado != 'PENDIENTE'}" style="color:var(--color-rosa-borde);font-size:0.85rem;">—</span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="vacio" th:if="${#lists.isEmpty(ordenes)}">
        <div style="font-size:3.5rem;margin-bottom:14px;">🛍️</div>
        <p style="font-size:1.1rem;font-weight:700;color:var(--color-texto-oscuro);">No hay pedidos registrados aún</p>
        <p style="font-size:0.9rem;color:var(--color-texto);margin-top:6px;opacity:.8;">Cuando alguien haga un pedido desde la tienda, aparecerá acá</p>
        <a class="empty-action" th:href="@{/productos}" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--color-rosa);color:white;border-radius:10px;text-decoration:none;font-weight:600;">Ver tienda</a>
    </div>
</div>

<th:block th:insert="~{fragments/toast :: toast}"></th:block>
<script th:src="@{/js/toast.js(v=${#dates.createNow().getTime()})}"></script>
</body>
</html>
