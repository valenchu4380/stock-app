<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${#dates.createNow().getTime()})}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobreVivi | Compras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root {
            --color-fondo: #F9F3EC;
            --color-crema: #F5EFE6;
            --color-melocoton: #EDD5CB;
            --color-rosa-claro: #E8C4C4;
            --color-rosa-borde: #D4B8AE;
            --color-rosa: #C97B7B;
            --color-verde-claro: #A8C4A2;
            --color-verde: #7D9E78;
            --color-texto: #5C4A3A;
            --color-texto-oscuro: #3B2E24;
        }
        body { background: var(--color-fondo); min-height: 100vh; }
        .hero { background: linear-gradient(135deg,var(--color-rosa),#B06060); color: white; text-align: center; padding: 28px 20px 20px; }
        .hero-brand { font-size: 2.2rem; font-weight: 900; letter-spacing: -.02em; }
        .hero-brand-sub { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; opacity: .65; margin-top: 2px; }
        .container { width: 90%; margin: 20px auto; max-width: 1200px; }
        .btn-volver { display: inline-block; margin-bottom: 16px; padding: 10px 20px; background: var(--color-crema); border: 1.5px solid var(--color-rosa-borde); border-radius: 10px; text-decoration: none; color: var(--color-texto); font-weight: 600; font-size: .9rem; }
        .btn-volver:hover { background: var(--color-melocoton); color: var(--color-rosa); }
        .msg { padding: 12px 18px; border-radius: 10px; margin-bottom: 16px; font-weight: 600; font-size: .9rem; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .tabla { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--color-crema); border-radius: 14px; overflow: hidden; box-shadow: 0 3px 12px rgba(0,0,0,.08); }
        .tabla th { background: var(--color-rosa); color: white; padding: 14px 12px; text-align: left; font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; }
        .tabla td { padding: 12px; font-size: .88rem; color: var(--color-texto); border-bottom: 1px solid var(--color-rosa-borde); vertical-align: top; }
        .tabla tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 700; text-transform: uppercase; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-completada { background: #d4edda; color: #155724; }
        .badge-cancelada { background: #f8d7da; color: #721c24; }
        .items-detalle { font-size: .82rem; line-height: 1.6; }
        .items-detalle .item-line { padding: 1px 0; }
        .btn-accion { padding: 6px 14px; border-radius: 8px; border: none; font-weight: 600; font-size: .8rem; cursor: pointer; margin: 2px; }
        .btn-completar { background: var(--color-verde); color: white; }
        .btn-completar:hover { background: #5f8b5a; }
        .btn-cancelar { background: #dc2626; color: white; }
        .btn-cancelar:hover { background: #b91c1c; }
        .vacio { text-align: center; padding: 40px; color: var(--color-texto); }
        @media (max-width: 768px) {
            .tabla th, .tabla td { padding: 8px 6px; font-size: .75rem; }
            .container { width: 96%; }
            .tabla, .tabla thead, .tabla tbody, .tabla tr, .tabla th, .tabla td { display: block; }
            .tabla thead { display: none; }
            .tabla tr { margin-bottom: 12px; border: 1px solid var(--color-rosa-borde); border-radius: 10px; padding: 10px; }
            .tabla td { border: none; padding: 4px 0; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-brand">SobreVivi</div>
    <div class="hero-brand-sub">📋 Compras / Pedidos</div>
</div>

<div class="container">
    <a class="btn-volver" th:href="@{/productos/dashboard}">← Dashboard</a>

    <div th:if="${mensaje}" class="msg success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <table class="tabla" th:if="${not #lists.isEmpty(ordenes)}">
        <thead>
            <tr>
                <th>#</th>
                <th>Fecha</th>
                <th>Items</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Completado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="o : ${ordenes}">
                <td th:text="${o.id}">1</td>
                <td th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}">-</td>
                <td class="items-detalle" th:text="${o.itemsJson}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(o.total, 1, 2)}">$0.00</td>
                <td>
                    <span class="badge" th:classappend="${o.estado == 'PENDIENTE'} ? 'badge-pendiente' : (${o.estado == 'COMPLETADA'} ? 'badge-completada' : 'badge-cancelada')"
                          th:text="${o.estado}">PENDIENTE</span>
                </td>
                <td th:text="${o.completedAt != null ? #temporals.format(o.completedAt, 'dd/MM HH:mm') : '—'}">—</td>
                <td>
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/completar(id=${o.id})}" method="post" style="display:inline">
                        <button class="btn-accion btn-completar">Completar</button>
                    </form>
                    <form th:if="${o.estado == 'PENDIENTE'}" th:action="@{/productos/compras/{id}/cancelar(id=${o.id})}" method="post" style="display:inline">
                        <button class="btn-accion btn-cancelar">Cancelar</button>
                    </form>
                    <span th:if="${o.estado != 'PENDIENTE'}" style="color:var(--color-rosa-borde);font-size:0.8rem;">—</span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="vacio" th:if="${#lists.isEmpty(ordenes)}">
        <p>No hay pedidos registrados aún.</p>
    </div>
</div>

</body>
</html>
